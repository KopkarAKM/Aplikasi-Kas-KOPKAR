<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aplikasi Kas Kecil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-20">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfP26-S4E0R4IsvKhx4CfFcHBvNFevVsTR0pwbuoey2IluMStp97MioxFawwdzxJueNw/exec';

    const IconHome = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconList = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconPlus = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconCheckFile = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="9 15 11 17 15 13"></polyline></svg>;
    const IconWallet = () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>;

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [role, setRole] = useState('kasir');
      const [transactions, setTransactions] = useState([]);
      const [opnames, setOpnames] = useState([]);
      const [printData, setPrintData] = useState(null);

      useEffect(() => {
        fetch(SCRIPT_URL + '?action=readData')
          .then(res => res.json())
          .then(data => {
            if(data.transactions) setTransactions(data.transactions);
            if(data.opnames) setOpnames(data.opnames);
          })
          .catch(err => console.log('Gagal memuat data dari Spreadsheet.'));
      }, []);

      const totalPemasukan = transactions.filter(t => t.type === 'masuk').reduce((sum, t) => sum + Number(t.amount), 0);
      const totalPengeluaran = transactions.filter(t => t.type === 'keluar').reduce((sum, t) => sum + Number(t.amount), 0);
      const saldoBuku = totalPemasukan - totalPengeluaran;

      const submitTransaksi = (e, formData) => {
        e.preventDefault();
        const newTx = { id: Date.now(), date: formData.date, type: formData.type, amount: Number(formData.amount), desc: formData.desc };
        setTransactions([...transactions, newTx]);
        
        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'addTransaction', ...newTx })
        });
      };

      const submitOpname = (dataOpname) => {
        setOpnames([dataOpname, ...opnames]);
        setActiveTab('approval');
        
        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'submitOpname', ...dataOpname })
        });
      };

      const updateStatus = (id, actionRole) => {
        let approverName = role === 'bendahara' ? 'Bendahara' : 'Manager';
        
        setOpnames(opnames.map(op => {
          if (op.id === id) {
            if (actionRole === 'periksa') return { ...op, status: 'Menunggu Disetujui', diperiksaOleh: approverName };
            if (actionRole === 'setujui') return { ...op, status: 'Selesai', diketahuiOleh: approverName };
          }
          return op;
        }));
        
        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', id: id, role: role, approver: approverName })
        });
      };

      const handlePrint = (op) => {
        setPrintData(op);
        setTimeout(() => {
          window.print();
          setPrintData(null);
        }, 500);
      };

      const PrintTemplate = ({ op }) => {
        // Mengganti optional chaining (?.) dengan pengecekan standar agar didukung oleh Babel 6
        const kertas = (op.pecahan && op.pecahan.kertas) ? op.pecahan.kertas : {'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''};
        const logam = (op.pecahan && op.pecahan.logam) ? op.pecahan.logam : {'1000':'', '500':'', '200':'', '100':''};
        const totalKertas = Object.entries(kertas).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
        const totalLogam = Object.entries(logam).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);

        return (
          <div className="p-8 bg-white text-black font-serif text-sm max-w-2xl mx-auto">
            {/* Header / Kop Surat Resmi */}
            <div className="flex items-center justify-between border-b-4 border-black pb-4 mb-6">
              <div className="w-1/5 flex justify-center">
                <img src="https://i.ibb.co.com/WvTwLMn5/image-1.png" alt="Logo KOPKAR AKM" className="w-24 h-auto object-contain" />
              </div>
              <div className="w-4/5 text-center px-4 leading-tight">
                <h1 className="text-xl font-bold text-gray-900">KOPERASI KARYAWAN ADARO KARYA MANDIRI</h1>
                <h2 className="text-lg font-bold text-gray-900">KOPKAR AKM</h2>
                <p className="text-xs mt-1 text-gray-800">Badan Hukum Nomor : 2128/BH/IX Tanggal 31 Juli 1995</p>
                <p className="text-xs text-gray-800">Office : Jl. Jend. A. Yani Komp. Swadharma Jalur II Blok Mawar RT IV</p>
                <p className="text-xs text-gray-800">Kel. Mabuun Kec. Murung Pudak Kab. Tabalong Prov. Kalimantan Selatan</p>
                <p className="text-xs text-gray-800">Kode Pos 71571 Telp/Fax : 0526 – 2023593  email : kopkar.adaro@gmail.com</p>
              </div>
            </div>

            <h3 className="text-xl font-bold text-center underline mb-1">FORMULIR CASH OPNAME</h3>
            <h4 className="text-md font-bold text-center mb-6">(Bukti Fisik Uang Kas)</h4>

            <table className="w-full mb-6">
              <tbody>
                <tr><td className="w-48 pb-1">Tanggal Cash Opname</td><td className="w-4">:</td><td>{formatDate(op.date)}</td></tr>
                <tr><td className="pb-1">Jam Pemeriksaan</td><td>:</td><td>{new Date(op.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</td></tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-2">SALDO MENURUT PEMBUKUAN</h3>
            <p className="mb-6">Saldo kas menurut pembukuan pertanggal tersebut adalah : <strong>{formatRp(op.saldoBuku)}</strong></p>

            <h3 className="font-bold underline mb-2">HASIL PERHITUNGAN FISIK UANG KAS</h3>
            <p className="font-bold mb-2">Uang Kertas</p>
            <table className="w-full border-collapse border border-black mb-4">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Pecahan</th>
                  <th className="border border-black p-2 text-center">Jumlah Lembar</th>
                  <th className="border border-black p-2 text-right">Total</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(kertas).sort((a,b)=>b-a).map(k => (
                  <tr key={k}>
                    <td className="border border-black p-2">Rp {Number(k).toLocaleString('id-ID')}</td>
                    <td className="border border-black p-2 text-center">{kertas[k] || 0}</td>
                    <td className="border border-black p-2 text-right">{formatRp(Number(k) * Number(kertas[k] || 0))}</td>
                  </tr>
                ))}
                <tr>
                  <td colSpan="2" className="border border-black p-2 font-bold text-right">Total Uang Kertas</td>
                  <td className="border border-black p-2 font-bold text-right">{formatRp(totalKertas)}</td>
                </tr>
              </tbody>
            </table>

            <p className="font-bold mb-2">Uang Logam</p>
            <table className="w-full border-collapse border border-black mb-6">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Pecahan</th>
                  <th className="border border-black p-2 text-center">Jumlah Keping</th>
                  <th className="border border-black p-2 text-right">Total</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(logam).sort((a,b)=>b-a).map(l => (
                  <tr key={l}>
                    <td className="border border-black p-2">Rp {Number(l).toLocaleString('id-ID')}</td>
                    <td className="border border-black p-2 text-center">{logam[l] || 0}</td>
                    <td className="border border-black p-2 text-right">{formatRp(Number(l) * Number(logam[l] || 0))}</td>
                  </tr>
                ))}
                <tr>
                  <td colSpan="2" className="border border-black p-2 font-bold text-right">Total Uang Logam</td>
                  <td className="border border-black p-2 font-bold text-right">{formatRp(totalLogam)}</td>
                </tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-2">TOTAL KAS FISIK</h3>
            <p className="mb-6">Total Kas Fisik (Uang Kertas + Logam) : <strong>{formatRp(op.saldoFisik)}</strong></p>

            <h3 className="font-bold underline mb-2">SELISIH KAS</h3>
            <table className="w-full border-collapse border border-black mb-6">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Keterangan</th>
                  <th className="border border-black p-2 text-right">Jumlah (Rp)</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td className="border border-black p-2">Saldo Pembukuan</td>
                  <td className="border border-black p-2 text-right">{formatRp(op.saldoBuku)}</td>
                </tr>
                <tr>
                  <td className="border border-black p-2">Saldo Fisik</td>
                  <td className="border border-black p-2 text-right">{formatRp(op.saldoFisik)}</td>
                </tr>
                <tr>
                  <td className="border border-black p-2 font-bold">Selisih (Lebih/Kurang)</td>
                  <td className="border border-black p-2 text-right font-bold">{formatRp(op.selisih)}</td>
                </tr>
                <tr>
                  <td colSpan="2" className="border border-black p-2">
                    <strong>Keterangan Selisih:</strong><br/>
                    {op.keterangan || "-"}
                  </td>
                </tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-4">TANDA TANGAN</h3>
            <table className="w-full text-center mt-4">
              <tbody>
                <tr>
                  <td className="w-1/3 pb-20">Dibuat oleh,</td>
                  <td className="w-1/3 pb-20">Diperiksa oleh,</td>
                  <td className="w-1/3 pb-20">Diketahui oleh,</td>
                </tr>
                <tr>
                  <td>( {op.user || 'Kasir'} )<br/>Kasir</td>
                  <td>( {op.diperiksaOleh || '.......................'} )<br/>Bendahara</td>
                  <td>( {op.diketahuiOleh || '.......................'} )<br/>Manager</td>
                </tr>
              </tbody>
            </table>
          </div>
        );
      };

      const Dashboard = () => (
        <div className="p-4 space-y-6">
          <div className="bg-blue-600 text-white p-5 rounded-2xl shadow-lg">
            <div className="flex items-center space-x-2 mb-2">
              <IconWallet />
              <h2 className="text-sm font-medium">Saldo Buku Saat Ini</h2>
            </div>
            <h1 className="text-3xl font-bold">{formatRp(saldoBuku)}</h1>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
              <p className="text-xs text-gray-500 mb-1">Pemasukan</p>
              <p className="text-lg font-bold text-green-600">{formatRp(totalPemasukan)}</p>
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
              <p className="text-xs text-gray-500 mb-1">Pengeluaran</p>
              <p className="text-lg font-bold text-red-600">{formatRp(totalPengeluaran)}</p>
            </div>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 divide-y">
            <div className="p-3 bg-gray-50 font-bold text-sm">Riwayat Transaksi</div>
            {transactions.length === 0 && <div className="p-4 text-center text-gray-500 text-sm">Belum ada transaksi.</div>}
            {transactions.slice().reverse().map(t => (
              <div key={t.id} className="p-4 flex justify-between items-center">
                <div>
                  <p className="text-sm font-medium">{t.desc}</p>
                  <p className="text-xs text-gray-500">{formatDate(t.date)}</p>
                </div>
                <p className={`text-sm font-bold ${t.type === 'masuk' ? 'text-green-600' : 'text-red-600'}`}>
                  {t.type === 'masuk' ? '+' : '-'}{formatRp(t.amount)}
                </p>
              </div>
            ))}
          </div>
        </div>
      );

      const TransaksiView = () => {
        const [showForm, setShowForm] = useState(false);
        const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], type: 'keluar', amount: '', desc: '' });

        return (
          <div className="p-4 space-y-4">
            <button onClick={() => setShowForm(!showForm)} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2">
              <IconPlus /> Tambah Transaksi Baru
            </button>
            {showForm && (
              <form onSubmit={(e) => { submitTransaksi(e, formData); setShowForm(false); }} className="bg-white p-4 rounded-xl shadow-sm border space-y-3">
                <input type="date" required className="w-full border p-2 rounded-lg" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                <div className="flex gap-2">
                  <button type="button" className={`flex-1 p-2 rounded-lg border font-medium ${formData.type === 'keluar' ? 'bg-red-50 border-red-200 text-red-600' : ''}`} onClick={() => setFormData({...formData, type: 'keluar'})}>Pengeluaran</button>
                  <button type="button" className={`flex-1 p-2 rounded-lg border font-medium ${formData.type === 'masuk' ? 'bg-green-50 border-green-200 text-green-600' : ''}`} onClick={() => setFormData({...formData, type: 'masuk'})}>Pemasukan</button>
                </div>
                <input type="number" required placeholder="Nominal Rp" className="w-full border p-2 rounded-lg" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                <input type="text" required placeholder="Keterangan" className="w-full border p-2 rounded-lg" value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} />
                <button type="submit" className="w-full bg-green-600 text-white py-2 rounded-lg font-bold">Simpan Transaksi</button>
              </form>
            )}
            
             <div className="bg-white rounded-xl shadow-sm border border-gray-100 divide-y">
              {transactions.slice().reverse().map(t => (
                <div key={t.id} className="p-4 flex justify-between items-center">
                  <div>
                    <p className="text-sm font-medium">{t.desc}</p>
                    <p className="text-xs text-gray-500">{formatDate(t.date)}</p>
                  </div>
                  <p className={`text-sm font-bold ${t.type === 'masuk' ? 'text-green-600' : 'text-red-600'}`}>
                    {t.type === 'masuk' ? '+' : '-'}{formatRp(t.amount)}
                  </p>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const CashOpnameView = () => {
        const [kertas, setKertas] = useState({'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''});
        const [logam, setLogam] = useState({'1000':'', '500':'', '200':'', '100':''});
        const [keteranganSelisih, setKeteranganSelisih] = useState('');

        const totalKertas = Object.entries(kertas).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
        const totalLogam = Object.entries(logam).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
        const totalFisik = totalKertas + totalLogam;
        const selisih = totalFisik - saldoBuku;

        const handleKirim = () => {
          submitOpname({
            id: Date.now(),
            date: new Date().toISOString(),
            saldoBuku: saldoBuku,
            saldoFisik: totalFisik,
            selisih: selisih,
            keterangan: keteranganSelisih,
            status: 'Menunggu Diperiksa',
            user: 'Kasir',
            pecahan: { kertas, logam }
          });
          setKertas({'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''});
          setLogam({'1000':'', '500':'', '200':'', '100':''});
          setKeteranganSelisih('');
        };

        return (
          <div className="p-4 space-y-4 pb-24">
            <div className="bg-blue-50 p-4 rounded-xl flex justify-between items-center border border-blue-100">
              <span className="text-sm font-medium">Saldo Pembukuan</span>
              <span className="text-lg font-bold text-blue-900">{formatRp(saldoBuku)}</span>
            </div>

            <div className="bg-white rounded-xl shadow-sm border p-4 space-y-3">
              <h3 className="font-bold border-b pb-2 text-gray-800">Lembar Uang Kertas</h3>
              {Object.keys(kertas).sort((a,b)=>b-a).map(k => (
                <div key={k} className="flex justify-between items-center py-1">
                  <span className="w-1/3 text-sm text-gray-600">{formatRp(k)}</span>
                  <input type="number" min="0" placeholder="0" className="w-1/3 border border-gray-300 rounded-md text-center p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={kertas[k]} onChange={e => setKertas({...kertas, [k]: e.target.value})} />
                  <span className="w-1/3 text-right font-medium text-sm text-gray-800">{formatRp(k * (kertas[k]||0))}</span>
                </div>
              ))}
              
              <h3 className="font-bold border-b pb-2 pt-4 text-gray-800">Keping Uang Logam</h3>
              {Object.keys(logam).sort((a,b)=>b-a).map(l => (
                <div key={l} className="flex justify-between items-center py-1">
                  <span className="w-1/3 text-sm text-gray-600">{formatRp(l)}</span>
                  <input type="number" min="0" placeholder="0" className="w-1/3 border border-gray-300 rounded-md text-center p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={logam[l]} onChange={e => setLogam({...logam, [l]: e.target.value})} />
                  <span className="w-1/3 text-right font-medium text-sm text-gray-800">{formatRp(l * (logam[l]||0))}</span>
                </div>
              ))}
            </div>

            <div className="bg-gray-800 text-white rounded-xl p-4 shadow-md">
              <div className="flex justify-between items-center"><span className="text-sm">Total Kas Fisik</span><span className="text-xl font-bold">{formatRp(totalFisik)}</span></div>
              <div className="flex justify-between mt-3 pt-3 border-t border-gray-600 items-center">
                <span className="text-sm">Selisih Kas</span><span className={`text-lg font-bold ${selisih < 0 ? 'text-red-400' : selisih > 0 ? 'text-yellow-400' : 'text-green-400'}`}>{selisih > 0 ? '+' : ''}{formatRp(selisih)}</span>
              </div>
            </div>

            {selisih !== 0 && (
              <textarea className="w-full border-red-300 border focus:ring-2 focus:ring-red-500 rounded-lg p-3 outline-none" rows="3" placeholder="Wajib ketik alasan selisih di sini..." value={keteranganSelisih} onChange={e => setKeteranganSelisih(e.target.value)} />
            )}

            <button onClick={handleKirim} disabled={selisih !== 0 && !keteranganSelisih.trim()} className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">Kirim Laporan Opname</button>
          </div>
        );
      };

      const ApprovalView = () => (
        <div className="p-4 space-y-4 pb-24">
           {opnames.length === 0 && <div className="text-center py-10 text-gray-400 text-sm">Belum ada data Cash Opname.</div>}
          {opnames.map(op => (
            <div key={op.id} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-3">
              <div className="flex justify-between items-start border-b pb-2">
                <div>
                    <p className="text-xs text-gray-500">{formatDate(op.date)}</p>
                    <p className="text-sm font-bold mt-1 text-gray-800">Opname Kas</p>
                </div>
                <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase ${
                    op.status === 'Selesai' ? 'bg-green-100 text-green-700' :
                    op.status === 'Menunggu Disetujui' ? 'bg-yellow-100 text-yellow-700' :
                    'bg-blue-100 text-blue-700'
                  }`}>{op.status}</span>
              </div>
              
              <div className="text-sm grid grid-cols-2 gap-2 py-2">
                <span className="text-gray-600">Saldo Buku:</span>
                <span className="text-right font-medium text-gray-800">{formatRp(op.saldoBuku)}</span>
                <span className="text-gray-600">Fisik Uang:</span>
                <span className="text-right font-medium text-gray-800">{formatRp(op.saldoFisik)}</span>
                <span className="text-gray-600">Selisih:</span>
                <span className={`text-right font-bold ${op.selisih !== 0 ? 'text-red-600' : 'text-green-600'}`}>{formatRp(op.selisih)}</span>
              </div>

              {op.selisih !== 0 && (
                <div className="bg-red-50 p-2 rounded text-xs text-red-800 border border-red-100">
                    <strong>Ket:</strong> {op.keterangan}
                </div>
              )}

              <div className="bg-gray-50 p-3 rounded-lg text-xs space-y-2 mb-2">
              <div className="flex justify-between items-center text-gray-700">
                <span>Dibuat Oleh:</span>
                <span className="font-bold">{op.user || 'Kasir'}</span>
              </div>
              <div className="flex justify-between items-center text-gray-700">
                <span>Diperiksa Oleh:</span>
                <span className="font-bold">{op.diperiksaOleh || '-'}</span>
              </div>
              <div className="flex justify-between items-center text-gray-700">
                <span>Diketahui Oleh:</span>
                <span className="font-bold">{op.diketahuiOleh || '-'}</span>
              </div>
            </div>

            <button onClick={() => handlePrint(op)} className="w-full bg-gray-100 text-gray-700 border border-gray-300 py-2 rounded-lg font-bold text-sm mb-2 flex justify-center items-center gap-2 hover:bg-gray-200 transition-colors">
              <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"></path></svg>
              Cetak PDF Laporan
            </button>

            {role === 'bendahara' && op.status === 'Menunggu Diperiksa' && (
              <button onClick={() => updateStatus(op.id, 'periksa')} className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">Tandai Diperiksa (Bendahara)</button>
            )}
              {role === 'manager' && op.status === 'Menunggu Disetujui' && (
                <button onClick={() => updateStatus(op.id, 'setujui')} className="w-full bg-green-600 text-white py-2 rounded-lg font-bold text-sm">Setujui Opname (Manager)</button>
              )}
            </div>
          ))}
        </div>
      );

      if (printData) {
        return <PrintTemplate op={printData} />;
      }

      return (
        <div className="max-w-md mx-auto relative min-h-screen bg-gray-50 shadow-xl overflow-hidden">
          <header className="bg-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm border-b">
            <div className="flex items-center gap-2">
               <div className="bg-blue-600 text-white p-1.5 rounded-lg"><IconWallet /></div>
               <h1 className="font-bold text-lg text-gray-800">KasKecil<span className="text-blue-600">Pro</span></h1>
            </div>
            <select value={role} onChange={e => setRole(e.target.value)} className="bg-gray-100 border border-gray-200 p-1.5 rounded-full text-xs font-medium outline-none focus:ring-2 focus:ring-blue-500">
              <option value="kasir">👤 Kasir</option>
              <option value="bendahara">💰 Bendahara</option>
              <option value="manager">👑 Manager</option>
            </select>
          </header>

          <main className="h-full overflow-y-auto">
            {activeTab === 'dashboard' && <Dashboard />}
            {activeTab === 'transaksi' && <TransaksiView />}
            {activeTab === 'opname' && <CashOpnameView />}
            {activeTab === 'approval' && <ApprovalView />}
          </main>

          <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around p-2 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 transition-colors ${activeTab==='dashboard'?'text-blue-600':'text-gray-400'}`}><IconHome /><span className="text-[10px] mt-1 font-medium">Dashboard</span></button>
            <button onClick={() => setActiveTab('transaksi')} className={`flex flex-col items-center p-2 transition-colors ${activeTab==='transaksi'?'text-blue-600':'text-gray-400'}`}><IconList /><span className="text-[10px] mt-1 font-medium">Transaksi</span></button>
            <button onClick={() => setActiveTab('opname')} className={`flex flex-col items-center p-2 -mt-6`}><div className={`bg-blue-600 text-white p-3 rounded-full border-4 border-gray-50 shadow-lg ${activeTab === 'opname' ? 'ring-2 ring-blue-300' : ''}`}><IconPlus /></div><span className={`text-[10px] mt-1 font-medium ${activeTab === 'opname' ? 'text-blue-600' : 'text-gray-500'}`}>Opname</span></button>
            <button onClick={() => setActiveTab('approval')} className={`flex flex-col items-center p-2 transition-colors relative ${activeTab==='approval'?'text-blue-600':'text-gray-400'}`}>
                <IconCheckFile />
                {opnames.filter(o => o.status !== 'Selesai').length > 0 && <span className="absolute top-1 right-2 w-2 h-2 bg-red-500 rounded-full border border-white"></span>}
                <span className="text-[10px] mt-1 font-medium">Persetujuan</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
