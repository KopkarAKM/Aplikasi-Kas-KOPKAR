<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KasKecil Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { box-sizing: border-box; }
    
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
    
    .tab-active { @apply text-blue-400; }
    .tab-inactive { @apply text-slate-500 hover:text-slate-400; }
    .tab-button { @apply transition-all duration-300; }
    
    .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:scale-[1.02]; }
    .btn-press { @apply active:scale-95 transition-transform duration-150; }
    
    .input-focus { @apply focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200 outline-none; }
    .transaction-enter { animation: slideUp 0.4s ease-out forwards; opacity: 0; }
    .dot { @apply w-2 h-2 rounded-full; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

    @media print {
      .no-print { display: none !important; }
      body, html { background: white !important; color: black !important; }
      #root { display: block !important; height: auto !important; }
      .print-container { padding: 0 !important; max-width: 100% !important; }
    }
  </style>
</head>
<body class="h-full bg-gradient-to-b from-slate-950 via-blue-950 to-slate-900 text-white">
  <div id="root" class="h-full w-full flex justify-center"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfP26-S4E0R4IsvKhx4CfFcHBvNFevVsTR0pwbuoey2IluMStp97MioxFawwdzxJueNw/exec';

    // Ikons
    const IconHome = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconList = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>;
    const IconPlus = () => <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconCheckFile = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="9 15 11 17 15 13"></polyline></svg>;
    const IconArrowDownLeft = () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="17" y1="7" x2="7" y2="17"></line><polyline points="17 17 7 17 7 7"></polyline></svg>;
    const IconArrowUpRight = () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>;
    const IconSearch = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconInbox = () => <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>;
    const IconClock = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheckCircle = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconX = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconOpname = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
    const IconPrint = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const IconBack = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;

    // Utility Format
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
    const formatDate = (dateString) => {
        if (!dateString) return '-';
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return String(dateString); // Jika gagal parse, kembalikan teks aslinya
        const today = new Date();
        if (date.toDateString() === today.toDateString()) return 'Hari ini';
        return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    // Fungsi Pembaca Kolom Cerdas (Otomatis menyesuaikan dengan nama kolom apapun di Google Sheet)
    const normalizeTx = (t) => {
      const keys = Object.keys(t);
      const findKey = (words) => keys.find(k => words.some(w => k.toLowerCase().includes(w)));
      
      const typeKey = findKey(['jenis', 'type', 'kategori']);
      const amountKey = findKey(['nominal', 'amount', 'jumlah', 'total']);
      const descKey = findKey(['keterangan', 'desc', 'uraian', 'rincian']);
      const dateKey = findKey(['tanggal', 'date', 'waktu']);
      
      const typeRaw = String(typeKey ? t[typeKey] : (t.type || '')).toLowerCase();
      
      return {
        id: t.id || t.ID || Date.now() + Math.random(),
        date: dateKey ? t[dateKey] : (t.date || ''),
        type: typeRaw.includes('masuk') ? 'masuk' : 'keluar',
        amount: Number(amountKey ? t[amountKey] : (t.amount || 0)),
        desc: descKey ? t[descKey] : (t.desc || 'Tanpa Keterangan')
      };
    };

    const normalizeOp = (op) => {
      const keys = Object.keys(op);
      const findKey = (words) => keys.find(k => words.some(w => k.toLowerCase().includes(w)));
      
      const pecahanKey = findKey(['pecahan', 'detail']);
      const dateKey = findKey(['tanggal', 'date']);
      const saldoBukuKey = findKey(['buku']);
      const saldoFisikKey = findKey(['fisik']);
      const selisihKey = findKey(['selisih']);
      const ketKey = findKey(['keterangan', 'ket']);
      const statusKey = findKey(['status']);
      const userKey = findKey(['buat', 'user', 'kasir']);
      const periksaKey = findKey(['periksa']);
      const tahuKey = findKey(['tahu', 'setuju']);

      let pecahanData = {};
      try {
        const rawPecahan = pecahanKey ? op[pecahanKey] : op.pecahan;
        pecahanData = typeof rawPecahan === 'string' ? JSON.parse(rawPecahan || '{}') : (rawPecahan || {});
      } catch(e) {}
      
      return {
        id: op.id || op.ID || Date.now() + Math.random(),
        date: dateKey ? op[dateKey] : (op.date || ''),
        saldoBuku: Number(saldoBukuKey ? op[saldoBukuKey] : (op.saldoBuku || 0)),
        saldoFisik: Number(saldoFisikKey ? op[saldoFisikKey] : (op.saldoFisik || 0)),
        selisih: Number(selisihKey ? op[selisihKey] : (op.selisih || 0)),
        keterangan: ketKey ? op[ketKey] : (op.keterangan || ''),
        status: statusKey ? op[statusKey] : (op.status || 'Menunggu Diperiksa'),
        user: userKey ? op[userKey] : (op.user || 'Kasir'),
        diperiksaOleh: periksaKey ? op[periksaKey] : (op.diperiksaOleh || '-'),
        diketahuiOleh: tahuKey ? op[tahuKey] : (op.diketahuiOleh || '-'),
        pecahan: pecahanData
      };
    };

    // --- KOMPONEN TERPISAH ---

    const Dashboard = ({ transactions, saldoBuku, totalPemasukan, totalPengeluaran, setActiveTab }) => {
      const recent = transactions.slice(0, 3);
      const statusColor = saldoBuku >= 0 ? 'from-emerald-500 to-teal-600' : 'from-red-500 to-orange-600';

      return (
        <div className="p-4 space-y-4 animate-fade-in pb-28">
          <div className={`bg-gradient-to-br ${statusColor} rounded-2xl p-6 text-white shadow-2xl animate-scale-in transform transition-all duration-300`}>
            <div className="flex items-center justify-between">
              <div>
                <p className="text-sm opacity-90 font-medium">💰 Saldo Buku Anda</p>
                <p className="text-3xl font-bold mt-2 tracking-tight">{formatRp(saldoBuku)}</p>
                <p className="text-xs opacity-75 mt-3">Sesuai Data Terkini</p>
              </div>
              <div className="text-5xl opacity-20">{saldoBuku >= 0 ? '📈' : '📉'}</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div className="bg-gradient-to-br from-emerald-500/20 to-emerald-600/20 border border-emerald-500/30 rounded-xl p-4 shadow-lg card-hover animate-scale-in" style={{animationDelay: '0.1s'}}>
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-xs text-emerald-200 uppercase font-semibold tracking-wide">Pemasukan</p>
                  <p className="text-lg font-bold text-emerald-400 mt-2">{formatRp(totalPemasukan)}</p>
                </div>
                <div className="text-emerald-400 opacity-30"><IconArrowDownLeft /></div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-red-500/20 to-red-600/20 border border-red-500/30 rounded-xl p-4 shadow-lg card-hover animate-scale-in" style={{animationDelay: '0.15s'}}>
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-xs text-red-200 uppercase font-semibold tracking-wide">Pengeluaran</p>
                  <p className="text-lg font-bold text-red-400 mt-2">{formatRp(totalPengeluaran)}</p>
                </div>
                <div className="text-red-400 opacity-30"><IconArrowUpRight /></div>
              </div>
            </div>
          </div>

          <div className="animate-fade-in mt-4">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-bold text-white flex items-center gap-2">
                <span className="dot bg-blue-400"></span> Transaksi Terbaru
              </h3>
              <button onClick={() => setActiveTab('transaksi')} className="text-xs text-blue-400 hover:text-blue-300 font-semibold cursor-pointer btn-press">Lihat Semua →</button>
            </div>
            
            {recent.length === 0 ? (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 text-center">
                <div className="flex justify-center text-slate-600 mb-2"><IconInbox /></div>
                <p className="text-sm text-slate-400">Belum ada transaksi</p>
              </div>
            ) : (
              <div className="space-y-2">
                {recent.map((t, index) => {
                  const isIn = t.type === 'masuk';
                  return (
                    <div key={t.id} className={`bg-gradient-to-r ${isIn ? 'from-emerald-900/30 to-teal-900/20 border-emerald-700/40' : 'from-red-900/30 to-orange-900/20 border-red-700/40'} border rounded-xl p-4 shadow-lg card-hover transaction-enter`} style={{animationDelay: `${index * 0.08}s`}}>
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <div className={`w-10 h-10 rounded-full ${isIn ? 'bg-gradient-to-br from-emerald-500 to-teal-600' : 'bg-gradient-to-br from-red-500 to-orange-600'} flex items-center justify-center shadow-lg text-white`}>
                            {isIn ? <IconArrowDownLeft /> : <IconArrowUpRight />}
                          </div>
                          <div>
                            <p className="text-sm font-semibold text-white truncate max-w-[150px]">{t.desc}</p>
                            <div className="flex items-center gap-2 mt-1">
                              <span className={`dot ${isIn ? 'bg-emerald-400/50' : 'bg-red-400/50'}`}></span>
                              <span className="text-xs text-slate-400">{formatDate(t.date)}</span>
                            </div>
                          </div>
                        </div>
                        <div className="text-right whitespace-nowrap">
                          <p className={`text-sm font-bold ${isIn ? 'text-emerald-400' : 'text-red-400'}`}>{isIn ? '+' : '-'}{formatRp(t.amount)}</p>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    };

    const TransaksiView = ({ transactions, submitTransaksi }) => {
      const [searchQuery, setSearchQuery] = useState('');
      const [showForm, setShowForm] = useState(false);
      const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], type: 'keluar', amount: '', desc: '' });

      const filtered = transactions.filter(t => 
        (t.desc || '').toLowerCase().includes((searchQuery || '').toLowerCase())
      );

      const handleAdd = (e) => {
        e.preventDefault();
        submitTransaksi({ id: Date.now(), ...formData, amount: Number(formData.amount) });
        setShowForm(false);
        setFormData({ date: new Date().toISOString().split('T')[0], type: 'keluar', amount: '', desc: '' });
      };

      return (
        <div className="p-4 space-y-4 pb-28 h-full flex flex-col">
          <div className="relative animate-slide-down">
            <div className="absolute left-4 top-3.5 text-slate-500"><IconSearch /></div>
            <input type="text" placeholder="🔍 Cari transaksi..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-xl pl-11 pr-4 py-3 text-white text-sm placeholder-slate-500 input-focus" />
          </div>

          <div className="space-y-2 flex-1">
            {filtered.length === 0 ? (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-8 text-center mt-8">
                <div className="flex justify-center text-slate-600 mb-3"><IconSearch /></div>
                <p className="text-sm text-slate-400">Tidak ada transaksi ditemukan</p>
              </div>
            ) : (
              filtered.map((t, index) => {
                const isIn = t.type === 'masuk';
                return (
                  <div key={t.id} className={`bg-gradient-to-r ${isIn ? 'from-emerald-900/30 to-teal-900/20 border-emerald-700/40' : 'from-red-900/30 to-orange-900/20 border-red-700/40'} border rounded-xl p-4 shadow-lg card-hover transaction-enter`} style={{animationDelay: `${index * 0.05}s`}}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-full ${isIn ? 'bg-gradient-to-br from-emerald-500 to-teal-600' : 'bg-gradient-to-br from-red-500 to-orange-600'} flex items-center justify-center shadow-lg text-white`}>
                          {isIn ? <IconArrowDownLeft /> : <IconArrowUpRight />}
                        </div>
                        <div>
                          <p className="text-sm font-semibold text-white">{t.desc}</p>
                          <div className="flex items-center gap-2 mt-1">
                            <span className={`dot ${isIn ? 'bg-emerald-400/50' : 'bg-red-400/50'}`}></span>
                            <span className="text-xs text-slate-400">{formatDate(t.date)}</span>
                          </div>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className={`text-sm font-bold ${isIn ? 'text-emerald-400' : 'text-red-400'}`}>{isIn ? '+' : '-'}{formatRp(t.amount)}</p>
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>

          <button onClick={() => setShowForm(true)} className="absolute bottom-24 right-6 w-14 h-14 bg-gradient-to-br from-emerald-400 to-blue-600 rounded-full shadow-2xl flex items-center justify-center text-white z-20 btn-press hover:shadow-emerald-500/50 hover:shadow-2xl">
            <IconPlus />
          </button>

          {showForm && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 flex items-end animate-fade-in max-w-md mx-auto">
              <div className="bg-gradient-to-b from-slate-800 to-slate-900 w-full rounded-t-3xl p-6 animate-slide-up border-t border-slate-700/50 shadow-2xl">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="font-bold text-xl text-white">Tambah Transaksi</h2>
                  <button onClick={() => setShowForm(false)} className="text-slate-400 hover:text-white transition btn-press"><IconX /></button>
                </div>
                <form onSubmit={handleAdd} className="space-y-3">
                  <div>
                    <label className="text-sm font-semibold text-slate-300 mb-2 block">Tanggal</label>
                    <input type="date" required className="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white text-sm input-focus placeholder-slate-400 style-color-scheme-dark" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} style={{ colorScheme: 'dark' }} />
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-slate-300 mb-2 block">Jenis Transaksi</label>
                    <div className="flex gap-2">
                      <button type="button" className={`flex-1 py-3 rounded-xl border font-semibold text-sm transition-all btn-press ${formData.type === 'keluar' ? 'bg-red-500/20 border-red-500 text-red-400' : 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600'}`} onClick={() => setFormData({...formData, type: 'keluar'})}>💸 Keluar</button>
                      <button type="button" className={`flex-1 py-3 rounded-xl border font-semibold text-sm transition-all btn-press ${formData.type === 'masuk' ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400' : 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600'}`} onClick={() => setFormData({...formData, type: 'masuk'})}>💰 Masuk</button>
                    </div>
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-slate-300 mb-2 block">Nominal (Rp)</label>
                    <input type="number" required placeholder="0" className="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white text-sm input-focus placeholder-slate-400" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-slate-300 mb-2 block">Keterangan</label>
                    <input type="text" required placeholder="Misal: Beli ATK..." className="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white text-sm input-focus placeholder-slate-400" value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} />
                  </div>
                  <div className="flex gap-3 mt-6 pt-2">
                    <button type="button" onClick={() => setShowForm(false)} className="flex-1 py-3 rounded-xl border border-slate-600 text-white text-sm font-semibold hover:bg-slate-700 transition-all btn-press">Batal</button>
                    <button type="submit" className="flex-1 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-blue-600 text-white text-sm font-bold hover:shadow-lg transition-all btn-press">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const CashOpnameView = ({ saldoBuku, submitOpname }) => {
      const [kertas, setKertas] = useState({'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''});
      const [logam, setLogam] = useState({'1000':'', '500':'', '200':'', '100':''});
      const [keteranganSelisih, setKeteranganSelisih] = useState('');

      const totalKertas = Object.entries(kertas).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
      const totalLogam = Object.entries(logam).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
      const totalFisik = totalKertas + totalLogam;
      const selisih = totalFisik - saldoBuku;

      const handleKirim = () => {
        submitOpname({
          id: Date.now(), date: new Date().toISOString(), saldoBuku, saldoFisik: totalFisik, selisih, keterangan: keteranganSelisih, status: 'Menunggu Diperiksa', user: 'Kasir', pecahan: { kertas, logam }
        });
        setKertas({'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''});
        setLogam({'1000':'', '500':'', '200':'', '100':''});
        setKeteranganSelisih('');
      };

      return (
        <div className="p-4 space-y-4 pb-28 animate-fade-in">
          <div className="bg-blue-900/40 p-4 rounded-xl flex justify-between items-center border border-blue-500/30">
            <span className="text-sm font-medium text-blue-200">Saldo Pembukuan</span>
            <span className="text-lg font-bold text-blue-400">{formatRp(saldoBuku)}</span>
          </div>

          <div className="bg-slate-800/80 rounded-xl shadow-lg border border-slate-700/50 p-4 space-y-3">
            <h3 className="font-bold border-b border-slate-600 pb-2 text-slate-200">Lembar Uang Kertas</h3>
            {Object.keys(kertas).sort((a,b)=>b-a).map(k => (
              <div key={k} className="flex justify-between items-center py-1">
                <span className="w-1/3 text-sm text-slate-400">{formatRp(k)}</span>
                <input type="number" min="0" placeholder="0" className="w-1/3 bg-slate-700 border border-slate-600 rounded-md text-center p-1.5 text-white input-focus" value={kertas[k]} onChange={e => setKertas({...kertas, [k]: e.target.value})} />
                <span className="w-1/3 text-right font-medium text-sm text-emerald-400">{formatRp(k * (kertas[k]||0))}</span>
              </div>
            ))}
            
            <h3 className="font-bold border-b border-slate-600 pb-2 pt-4 text-slate-200">Keping Uang Logam</h3>
            {Object.keys(logam).sort((a,b)=>b-a).map(l => (
              <div key={l} className="flex justify-between items-center py-1">
                <span className="w-1/3 text-sm text-slate-400">{formatRp(l)}</span>
                <input type="number" min="0" placeholder="0" className="w-1/3 bg-slate-700 border border-slate-600 rounded-md text-center p-1.5 text-white input-focus" value={logam[l]} onChange={e => setLogam({...logam, [l]: e.target.value})} />
                <span className="w-1/3 text-right font-medium text-sm text-emerald-400">{formatRp(l * (logam[l]||0))}</span>
              </div>
            ))}
          </div>

          <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-4 shadow-xl border border-slate-700">
            <div className="flex justify-between items-center"><span className="text-sm text-slate-300">Total Kas Fisik</span><span className="text-xl font-bold text-white">{formatRp(totalFisik)}</span></div>
            <div className="flex justify-between mt-3 pt-3 border-t border-slate-700 items-center">
              <span className="text-sm text-slate-300">Selisih Kas</span>
              <span className={`text-lg font-bold ${selisih < 0 ? 'text-red-400' : selisih > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{selisih > 0 ? '+' : ''}{formatRp(selisih)}</span>
            </div>
          </div>

          {selisih !== 0 && (
            <textarea className="w-full bg-slate-800 border border-red-500/50 focus:border-red-500 rounded-lg p-3 text-white outline-none placeholder-slate-500" rows="3" placeholder="Wajib ketik alasan selisih di sini..." value={keteranganSelisih} onChange={e => setKeteranganSelisih(e.target.value)} />
          )}

          <button onClick={handleKirim} disabled={selisih !== 0 && !keteranganSelisih.trim()} className="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed shadow-lg btn-press">Kirim Laporan Opname</button>
        </div>
      );
    };

    const ApprovalView = ({ opnames, role, updateStatus, handlePrint }) => {
      const pendingCount = opnames.filter(o => o.status === 'Menunggu Diperiksa' || o.status === 'Menunggu Disetujui').length;
      const doneCount = opnames.filter(o => o.status === 'Selesai').length;

      return (
        <div className="p-4 space-y-4 pb-28 animate-fade-in">
          <div className="flex gap-2 mb-4">
            <div className="flex-1 bg-gradient-to-br from-amber-500/20 to-amber-600/20 border border-amber-600/30 rounded-lg p-3 animate-scale-in">
              <p className="text-xs text-amber-200 font-semibold">⏳ Menunggu</p>
              <p className="text-2xl font-bold text-amber-400 mt-1">{pendingCount}</p>
            </div>
            <div className="flex-1 bg-gradient-to-br from-emerald-500/20 to-emerald-600/20 border border-emerald-600/30 rounded-lg p-3 animate-scale-in" style={{animationDelay: '0.1s'}}>
              <p className="text-xs text-emerald-200 font-semibold">✓ Selesai</p>
              <p className="text-2xl font-bold text-emerald-400 mt-1">{doneCount}</p>
            </div>
          </div>

          {opnames.length === 0 && <div className="text-center py-10 text-slate-500 text-sm">Belum ada data Cash Opname.</div>}
          
          {opnames.map((op, i) => {
            const isPending = op.status !== 'Selesai';
            return (
              <div key={op.id} className={`bg-gradient-to-r ${isPending ? 'from-amber-900/30 to-orange-900/20 border-amber-700/40' : 'from-emerald-900/30 to-teal-900/20 border-emerald-700/40'} border rounded-xl p-4 shadow-lg card-hover transaction-enter`} style={{animationDelay: `${i * 0.1}s`}}>
                <div className="flex justify-between items-start border-b border-slate-700/50 pb-3 mb-3">
                  <div className="flex items-start gap-3 flex-1">
                    <div className={`w-10 h-10 rounded-full ${isPending ? 'bg-amber-500/20 border border-amber-500/40 text-amber-400' : 'bg-emerald-500/20 border border-emerald-500/40 text-emerald-400'} flex items-center justify-center`}>
                      {isPending ? <IconClock /> : <IconCheckCircle />}
                    </div>
                    <div>
                        <p className="text-sm font-semibold text-white">Opname Kas</p>
                        <p className="text-xs text-slate-400 mt-1">📅 {formatDate(op.date)}</p>
                    </div>
                  </div>
                  <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase ml-2 ${
                      op.status === 'Selesai' ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30' :
                      op.status === 'Menunggu Disetujui' ? 'bg-amber-500/20 text-amber-300 border border-amber-500/30' :
                      'bg-blue-500/20 text-blue-300 border border-blue-500/30'
                    }`}>{op.status}</span>
                </div>
                
                <div className="text-sm grid grid-cols-2 gap-2 py-2 text-slate-300">
                  <span className="text-slate-400">Saldo Buku:</span>
                  <span className="text-right font-medium text-white">{formatRp(op.saldoBuku)}</span>
                  <span className="text-slate-400">Fisik Uang:</span>
                  <span className="text-right font-medium text-white">{formatRp(op.saldoFisik)}</span>
                  <span className="text-slate-400">Selisih:</span>
                  <span className={`text-right font-bold ${op.selisih < 0 ? 'text-red-400' : op.selisih > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{formatRp(op.selisih)}</span>
                </div>

                {op.selisih !== 0 && (
                  <div className="bg-red-500/10 p-2 rounded text-xs text-red-300 border border-red-500/30 mt-2">
                      <strong>Ket:</strong> {op.keterangan}
                  </div>
                )}

                <div className="bg-slate-900/50 p-3 rounded-lg text-xs space-y-2 mt-3 border border-slate-700/50">
                  <div className="flex justify-between items-center text-slate-300">
                    <span>Dibuat Oleh:</span><span className="font-bold text-white">{op.user}</span>
                  </div>
                  <div className="flex justify-between items-center text-slate-300">
                    <span>Diperiksa Oleh:</span><span className="font-bold text-white">{op.diperiksaOleh}</span>
                  </div>
                  <div className="flex justify-between items-center text-slate-300">
                    <span>Diketahui Oleh:</span><span className="font-bold text-white">{op.diketahuiOleh}</span>
                  </div>
                </div>

                <button onClick={() => handlePrint(op)} className="w-full bg-slate-700 text-white border border-slate-600 py-2.5 rounded-lg font-bold text-sm mt-3 flex justify-center items-center gap-2 hover:bg-slate-600 transition-colors btn-press">
                  <IconPrint /> Cetak PDF Laporan
                </button>

                {role === 'bendahara' && op.status === 'Menunggu Diperiksa' && (
                  <button onClick={() => updateStatus(op.id, 'periksa')} className="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-2.5 rounded-lg font-bold text-sm mt-2 shadow-lg btn-press">Tandai Diperiksa</button>
                )}
                {role === 'manager' && op.status === 'Menunggu Disetujui' && (
                  <button onClick={() => updateStatus(op.id, 'setujui')} className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-2.5 rounded-lg font-bold text-sm mt-2 shadow-lg btn-press">Setujui Opname</button>
                )}
              </div>
            );
          })}
        </div>
      );
    };

    const PrintTemplate = ({ op, setPrintData }) => {
      const kertas = (op.pecahan && op.pecahan.kertas) ? op.pecahan.kertas : {'100000':'', '50000':'', '20000':'', '10000':'', '5000':'', '2000':'', '1000':''};
      const logam = (op.pecahan && op.pecahan.logam) ? op.pecahan.logam : {'1000':'', '500':'', '200':'', '100':''};
      const totalKertas = Object.entries(kertas).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);
      const totalLogam = Object.entries(logam).reduce((sum, [n, l]) => sum + (Number(n) * Number(l || 0)), 0);

      return (
        <div className="bg-white min-h-screen text-black font-serif w-full flex flex-col items-center">
          <div className="no-print w-full bg-slate-100 border-b border-slate-300 p-4 sticky top-0 shadow-sm flex justify-between items-center z-50">
            <button onClick={() => setPrintData(null)} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 rounded-lg text-slate-700 font-sans font-bold hover:bg-slate-50 btn-press">
              <IconBack /> Kembali
            </button>
            <button onClick={() => window.print()} className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-lg font-sans font-bold hover:bg-blue-700 shadow-md btn-press">
              <IconPrint /> Cetak Sekarang
            </button>
          </div>

          <div className="p-8 text-sm max-w-2xl w-full print-container bg-white">
            <div className="flex items-center justify-between border-b-4 border-black pb-4 mb-6">
              <div className="w-1/5 flex justify-center">
                <img src="https://i.ibb.co.com/WvTwLMn5/image-1.png" alt="Logo" className="w-24 h-auto object-contain" />
              </div>
              <div className="w-4/5 text-center px-4 leading-tight">
                <h1 className="text-xl font-bold">KOPERASI KARYAWAN ADARO KARYA MANDIRI</h1>
                <h2 className="text-lg font-bold">KOPKAR AKM</h2>
                <p className="text-xs mt-1">Badan Hukum Nomor : 2128/BH/IX Tanggal 31 Juli 1995</p>
                <p className="text-xs">Office : Jl. Jend. A. Yani Komp. Swadharma Jalur II Blok Mawar RT IV</p>
                <p className="text-xs">Kel. Mabuun Kec. Murung Pudak Kab. Tabalong Prov. Kalimantan Selatan</p>
                <p className="text-xs">Kode Pos 71571 Telp/Fax : 0526 – 2023593 email : kopkar.adaro@gmail.com</p>
              </div>
            </div>

            <h3 className="text-xl font-bold text-center underline mb-1">FORMULIR CASH OPNAME</h3>
            <h4 className="text-md font-bold text-center mb-6">(Bukti Fisik Uang Kas)</h4>

            <table className="w-full mb-6">
              <tbody>
                <tr><td className="w-48 pb-1">Tanggal Cash Opname</td><td className="w-4">:</td><td>{formatDate(op.date)}</td></tr>
                <tr><td className="pb-1">Jam Pemeriksaan</td><td>:</td><td>{op.date ? new Date(op.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) : '-'}</td></tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-2">SALDO MENURUT PEMBUKUAN</h3>
            <p className="mb-6">Saldo kas menurut pembukuan pertanggal tersebut adalah : <strong>{formatRp(op.saldoBuku)}</strong></p>

            <h3 className="font-bold underline mb-2">HASIL PERHITUNGAN FISIK UANG KAS</h3>
            <p className="font-bold mb-2">Uang Kertas</p>
            <table className="w-full border-collapse border border-black mb-4">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Pecahan</th>
                  <th className="border border-black p-2 text-center">Jumlah Lembar</th>
                  <th className="border border-black p-2 text-right">Total</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(kertas).sort((a,b)=>b-a).map(k => (
                  <tr key={k}>
                    <td className="border border-black p-2">Rp {Number(k).toLocaleString('id-ID')}</td>
                    <td className="border border-black p-2 text-center">{kertas[k] || 0}</td>
                    <td className="border border-black p-2 text-right">{formatRp(Number(k) * Number(kertas[k] || 0))}</td>
                  </tr>
                ))}
                <tr>
                  <td colSpan="2" className="border border-black p-2 font-bold text-right">Total Uang Kertas</td>
                  <td className="border border-black p-2 font-bold text-right">{formatRp(totalKertas)}</td>
                </tr>
              </tbody>
            </table>

            <p className="font-bold mb-2">Uang Logam</p>
            <table className="w-full border-collapse border border-black mb-6">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Pecahan</th>
                  <th className="border border-black p-2 text-center">Jumlah Keping</th>
                  <th className="border border-black p-2 text-right">Total</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(logam).sort((a,b)=>b-a).map(l => (
                  <tr key={l}>
                    <td className="border border-black p-2">Rp {Number(l).toLocaleString('id-ID')}</td>
                    <td className="border border-black p-2 text-center">{logam[l] || 0}</td>
                    <td className="border border-black p-2 text-right">{formatRp(Number(l) * Number(logam[l] || 0))}</td>
                  </tr>
                ))}
                <tr>
                  <td colSpan="2" className="border border-black p-2 font-bold text-right">Total Uang Logam</td>
                  <td className="border border-black p-2 font-bold text-right">{formatRp(totalLogam)}</td>
                </tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-2">TOTAL KAS FISIK</h3>
            <p className="mb-6">Total Kas Fisik (Uang Kertas + Logam) : <strong>{formatRp(op.saldoFisik)}</strong></p>

            <h3 className="font-bold underline mb-2">SELISIH KAS</h3>
            <table className="w-full border-collapse border border-black mb-6">
              <thead>
                <tr className="bg-gray-100">
                  <th className="border border-black p-2 text-left">Keterangan</th>
                  <th className="border border-black p-2 text-right">Jumlah (Rp)</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td className="border border-black p-2">Saldo Pembukuan</td>
                  <td className="border border-black p-2 text-right">{formatRp(op.saldoBuku)}</td>
                </tr>
                <tr>
                  <td className="border border-black p-2">Saldo Fisik</td>
                  <td className="border border-black p-2 text-right">{formatRp(op.saldoFisik)}</td>
                </tr>
                <tr>
                  <td className="border border-black p-2 font-bold">Selisih (Lebih/Kurang)</td>
                  <td className="border border-black p-2 text-right font-bold">{formatRp(op.selisih)}</td>
                </tr>
                <tr>
                  <td colSpan="2" className="border border-black p-2">
                    <strong>Keterangan Selisih:</strong><br/>
                    {op.keterangan || "-"}
                  </td>
                </tr>
              </tbody>
            </table>

            <h3 className="font-bold underline mb-4">TANDA TANGAN</h3>
            <table className="w-full text-center mt-4">
              <tbody>
                <tr>
                  <td className="w-1/3 pb-20">Dibuat oleh,</td>
                  <td className="w-1/3 pb-20">Diperiksa oleh,</td>
                  <td className="w-1/3 pb-20">Diketahui oleh,</td>
                </tr>
                <tr>
                  <td>( ....................................... )<br/>Kasir</td>
                  <td>( ....................................... )<br/>Bendahara</td>
                  <td>( ....................................... )<br/>Manager</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [role, setRole] = useState('kasir');
      const [rawTransactions, setRawTransactions] = useState([]);
      const [rawOpnames, setRawOpnames] = useState([]);
      const [printData, setPrintData] = useState(null);

      // Sinkronisasi data gabungan (Mencegah input hilang tertimpa sinkronisasi server)
      const fetchData = () => {
        fetch(SCRIPT_URL + '?action=readData')
          .then(res => res.json())
          .then(data => {
            if(data.transactions) {
              setRawTransactions(prev => {
                const localOnly = prev.filter(localTx => {
                  if (Date.now() - (localTx.id || 0) >= 60000) return false;
                  const isAlreadyOnServer = data.transactions.some(serverTx => {
                    const sTx = normalizeTx(serverTx);
                    return sTx.desc === localTx.desc && Number(sTx.amount) === Number(localTx.amount);
                  });
                  return !isAlreadyOnServer;
                });
                return [...data.transactions, ...localOnly];
              });
            }
            if(data.opnames) {
              setRawOpnames(prev => {
                const localOnly = prev.filter(localOp => {
                  if (Date.now() - (localOp.id || 0) >= 60000) return false;
                  const isAlreadyOnServer = data.opnames.some(serverOp => {
                    const sOp = normalizeOp(serverOp);
                    return Number(sOp.saldoFisik) === Number(localOp.saldoFisik) && Number(sOp.selisih) === Number(localOp.selisih);
                  });
                  return !isAlreadyOnServer;
                });
                return [...data.opnames, ...localOnly];
              });
            }
          })
          .catch(err => console.log('Sinkronisasi berjalan di latar...'));
      };

      useEffect(() => {
        fetchData();
        const syncInterval = setInterval(fetchData, 10000);
        return () => clearInterval(syncInterval);
      }, []);

      const transactions = rawTransactions.filter(t => Object.keys(t).length > 0).map(normalizeTx).reverse();
      const opnames = rawOpnames.filter(o => Object.keys(o).length > 0).map(normalizeOp).reverse();

      const totalPemasukan = transactions.filter(t => t.type === 'masuk').reduce((sum, t) => sum + t.amount, 0);
      const totalPengeluaran = transactions.filter(t => t.type === 'keluar').reduce((sum, t) => sum + t.amount, 0);
      const saldoBuku = totalPemasukan - totalPengeluaran;

      const submitTransaksi = (newTx) => {
        setRawTransactions(prev => [...prev, newTx]);
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addTransaction', ...newTx }) });
      };

      const submitOpname = (dataOpname) => {
        setRawOpnames(prev => [...prev, dataOpname]);
        setActiveTab('approval');
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'submitOpname', ...dataOpname }) });
      };

      const updateStatus = (id, actionRole) => {
        let approverName = role === 'bendahara' ? 'Bendahara' : 'Manager';
        setRawOpnames(prev => prev.map(op => {
          if (op.id === id || op.ID === id) {
            if (actionRole === 'periksa') return { ...op, status: 'Menunggu Disetujui', diperiksaOleh: approverName, 'Diperiksa Oleh': approverName };
            if (actionRole === 'setujui') return { ...op, status: 'Selesai', diketahuiOleh: approverName, 'Diketahui Oleh': approverName };
          }
          return op;
        }));
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', id: id, role: role, approver: approverName }) });
      };

      if (printData) {
        return <PrintTemplate op={printData} setPrintData={setPrintData} />;
      }

      return (
        <div className="w-full max-w-[430px] h-full bg-gradient-to-b from-slate-950 to-slate-900 flex flex-col overflow-hidden relative shadow-2xl">
          <header className="bg-gradient-to-r from-blue-600 to-blue-500 px-6 py-5 flex items-center justify-between shadow-2xl z-10">
            <div>
               <h1 className="text-2xl font-bold text-white tracking-tight">KasKecil Pro</h1>
               <select value={role} onChange={e => setRole(e.target.value)} className="bg-white/20 text-blue-50 border border-white/30 px-2 py-1 mt-1.5 rounded-md text-xs font-medium outline-none backdrop-blur cursor-pointer appearance-none">
                  <option value="kasir" className="text-slate-800">👤 Kasir</option>
                  <option value="bendahara" className="text-slate-800">💰 Bendahara</option>
                  <option value="manager" className="text-slate-800">👑 Manager</option>
               </select>
            </div>
            <div className="w-12 h-12 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white font-bold text-xl border border-white/30 shadow-lg uppercase">
               {role.charAt(0)}
            </div>
          </header>

          <main className="flex-1 overflow-y-auto" style={{ scrollBehavior: 'smooth' }}>
            {activeTab === 'dashboard' && <Dashboard transactions={transactions} saldoBuku={saldoBuku} totalPemasukan={totalPemasukan} totalPengeluaran={totalPengeluaran} setActiveTab={setActiveTab} />}
            {activeTab === 'transaksi' && <TransaksiView transactions={transactions} submitTransaksi={submitTransaksi} />}
            {activeTab === 'opname' && <CashOpnameView saldoBuku={saldoBuku} submitOpname={submitOpname} />}
            {activeTab === 'approval' && <ApprovalView opnames={opnames} role={role} updateStatus={updateStatus} handlePrint={setPrintData} />}
          </main>

          <nav className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-slate-900 to-slate-800 border-t border-slate-700/50 flex justify-around py-4 z-20 shadow-2xl">
            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1.5 tab-button btn-press ${activeTab==='dashboard'?'tab-active':'tab-inactive'}`}>
              <IconHome /><span className="text-[10px] font-semibold">Dashboard</span>
            </button>
            <button onClick={() => setActiveTab('transaksi')} className={`flex flex-col items-center gap-1.5 tab-button btn-press ${activeTab==='transaksi'?'tab-active':'tab-inactive'}`}>
              <IconList /><span className="text-[10px] font-semibold">Transaksi</span>
            </button>
            <button onClick={() => setActiveTab('opname')} className={`flex flex-col items-center gap-1.5 tab-button btn-press ${activeTab==='opname'?'tab-active':'tab-inactive'}`}>
              <IconOpname /><span className="text-[10px] font-semibold">Opname</span>
            </button>
            <button onClick={() => setActiveTab('approval')} className={`flex flex-col items-center gap-1.5 tab-button btn-press relative ${activeTab==='approval'?'tab-active':'tab-inactive'}`}>
                <IconCheckFile />
                {opnames.filter(o => o.status !== 'Selesai').length > 0 && <span className="absolute top-0 right-2.5 w-2 h-2 bg-amber-500 rounded-full border border-slate-800"></span>}
                <span className="text-[10px] font-semibold">Persetujuan</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
